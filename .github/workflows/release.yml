name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned macOS app
        run: |
          xcodebuild \
            -project LumenDesk.xcodeproj \
            -scheme LumenDesk \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="$PWD/build/Build/Products/Release/LumenDesk.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" LumenDesk-macOS.zip
          hdiutil create -volname "LumenDesk" -srcfolder "$APP_PATH" -ov -format UDZO LumenDesk-macOS.dmg

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumendesk-release-artifacts
          path: |
            LumenDesk-macOS.zip
            LumenDesk-macOS.dmg

  publish-release:
    runs-on: ubuntu-latest
    needs: build-macos
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: lumendesk-release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            LumenDesk-macOS.zip
            LumenDesk-macOS.dmg
